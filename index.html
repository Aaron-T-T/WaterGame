<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Drop Game</title>
    <link rel="stylesheet" href="styles.css">

    <!-- Charity: water brand-like font -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-wrapper">
        <h1 class="game-title">Water Drop</h1>
        <p class="game-tagline">Catch the good drops, avoid the bad ones!</p>

        <div class="difficulty-panel">
            <button class="difficulty-btn" data-mode="easy">Easy</button>
            <button class="difficulty-btn" data-mode="normal">Normal</button>
            <button class="difficulty-btn" data-mode="hard">Hard</button>
        </div>

        <div class="score-panel">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="timer">Time: <span id="time">30</span>s</div>
            <button id="start-btn">Start Game</button>
        </div>

        <div id="pollution-bar">
            <div id="pollution-fill"></div>
        </div>

        <div id="game-container"></div>

        <!-- Game Over Modal -->
        <div id="game-over-modal" class="hidden">
            <div class="modal-content">
                <h2>Game Over</h2>
                <p>Your Score: <span id="final-score"></span></p>
                <button id="restart-btn">Play Again</button>
            </div>
        </div>

        <!-- Charity: water footer -->
        <footer class="cw-footer">
            <p>Learn more about the mission:</p>
            <a href="https://www.charitywater.org" target="_blank">charitywater.org</a>
            <a href="https://www.charitywater.org/donate" target="_blank">Donate</a>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
